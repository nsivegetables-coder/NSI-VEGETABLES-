<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Luxury All-in-One Price List</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+Malayalam:wght@600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --nsi-dark-green: #064e28;
            --nsi-gold: #cca43b;
            --nsi-gold-light: #f9f5e8;
            --bg-gradient: #f4f7f5;
            --text-dark: #112211;
            --item-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Manrope', 'Noto Serif Malayalam', sans-serif;
            background-color: #eef2f0;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .control-panel {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
            border: 1px solid rgba(6, 78, 40, 0.1);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #064e28, #11753e);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(6, 78, 40, 0.2);
            transition: all 0.3s ease;
        }

        .loading-status {
            display: none;
            color: var(--nsi-dark-green);
            font-weight: 600;
            margin: 15px 0;
            font-size: 14px;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
        }

        .poster-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
        }

        /* ✨ പ്രീമിയം ലുക്കുള്ള മെയിൻ കാർഡ് */
        .poster-card {
            width: 100%;
            background: #ffffff;
            border-top: 12px solid var(--nsi-dark-green);
            border-bottom: 12px solid var(--nsi-dark-green);
            border-left: 2px solid rgba(6, 78, 40, 0.1);
            border-right: 2px solid rgba(6, 78, 40, 0.1);
            border-radius: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        /* 👑 രാജകീയമായ ഹെഡർ ഡിസൈൻ */
        .poster-header {
            background: linear-gradient(to bottom, #ffffff, #fafdFA);
            padding: 25px 15px 15px 15px;
            text-align: center;
            position: relative;
        }

        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            color: var(--nsi-dark-green);
            letter-spacing: 1.5px;
            margin: 0;
            line-height: 1;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--nsi-gold);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        .divider-gold {
            width: 60px;
            height: 3px;
            background: var(--nsi-gold);
            margin: 10px auto;
            border-radius: 2px;
        }

        .banner-tagline {
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            margin: 5px 0 12px 0;
            font-style: italic;
        }

        .title-badge {
            background: var(--nsi-dark-green);
            color: #ffffff;
            padding: 5px 30px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 700;
            display: inline-block;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(6, 78, 40, 0.15);
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            margin-top: 15px;
            font-size: 12px;
            color: #718096;
            font-weight: 600;
            border-top: 1px solid #edf2f7;
            padding-top: 10px;
        }

        /* 🛒 ലക്ഷ്വറി ഐറ്റം ഗ്രിഡ് */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 15px;
            background: #fafbfa;
            box-sizing: border-box;
        }

        .grid-box {
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--item-bg);
            box-sizing: border-box;
            height: 56px;
            min-width: 0;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }

        .box-left {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            min-width: 0;
            flex: 1;
        }

        .box-num {
            font-size: 10px;
            background: #edf2f7;
            color: var(--nsi-dark-green);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .box-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .box-price-tag {
            text-align: center;
            background: linear-gradient(135deg, #064e28, #0b6b39);
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            min-width: 52px;
            flex-shrink: 0;
            box-sizing: border-box;
            border-bottom: 2px solid var(--nsi-gold);
        }

        .tag-unit {
            font-size: 8px;
            display: block;
            opacity: 0.85;
            line-height: 1;
            margin-bottom: 2px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .tag-amount {
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
            display: block;
        }

        /* 🏆 പ്രീമിയം ഫൂട്ടർ ഡിസൈൻ */
        .poster-footer {
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 15px 15px 20px 15px;
            text-align: center;
        }

        .footer-banner-wa {
            background: var(--nsi-gold-light);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(204, 164, 59, 0.3);
            font-size: 12px;
            font-weight: 700;
            color: var(--nsi-dark-green);
            margin-bottom: 12px;
        }

        .footer-banner-wa b {
            color: #d35400;
            font-size: 14px;
        }

        .delivery-badges-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .badge-premium {
            font-size: 9px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .badge-green { background: #e6f4ea; color: #137333; }
        .badge-gold { background: var(--nsi-gold-light); color: #b08207; }

        .guarantee-row {
            font-size: 10px;
            font-weight: 600;
            color: #718096;
            border-top: 1px solid #f1f5f9;
            padding-top: 10px;
            display: flex;
            justify-content: space-around;
        }

        /* 🟢 ഷെയർ ബട്ടൺ സ്റ്റൈൽ */
        .btn-share-wa {
            background: #25d366;
            color: white;
            border: none;
            padding: 15px 24px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            margin-top: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        
        .btn-share-wa:active {
            transform: scale(0.98);
        }

        .text-backup-card {
            background: white;
            padding: 18px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }
        textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e0; background: #f7fafc; font-family: inherit; font-size: 13px; box-sizing: border-box; }
        .btn-copy-text { width: 100%; background: #2d3748; color: white; border: none; padding: 14px; border-radius: 12px; margin-top: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2 style="margin: 0 0 5px 0; font-size: 20px; color: var(--nsi-dark-green); font-weight: 800;">NSI Premium Hub</h2>
        <p style="margin: 0 0 18px 0; font-size: 12px; color: #718096;">ലക്ഷ്വറി സിംഗിൾ പോസ്റ്റർ ജനറേറ്റർ സിസ്റ്റം</p>
        <button class="btn-generate" onclick="generatePremiumPosters()">✨ പ്രീമിയം പോസ്റ്റർ നിർമ്മിക്കുക</button>
    </div>

    <div id="loading" class="loading-status">⏳ ഷീറ്റിൽ നിന്നും പ്രീമിയം പ്രൈസ് ലിസ്റ്റ് ഡാറ്റ ശേഖരിക്കുന്നു...</div>

    <div class="posters-container" id="posters-container"></div>

    <div class="text-backup-card" id="text-card">
        <span style="font-size: 13px; font-weight: 700; color: #2d3748; display:block; margin-bottom: 8px;">💬 വാട്സാപ്പ് മെസ്സേജ് ടെക്സ്റ്റ് ലിസ്റ്റ്:</span>
        <textarea id="text-area" rows="6"></textarea>
        <button class="btn-copy-text" onclick="copyBroadcastText()">📋 ടെക്സ്റ്റ് ലിസ്റ്റ് കോപ്പി ചെയ്യുക</button>
    </div>

<script>
    const sheetAppUrl = "https://script.google.com/macros/s/AKfycbyg9RmH2iFblNzWNBBL7J4SR-W003CQnDju8RPoPBINF_cD6Fdidkn7h9QLvMsL8u4z/exec";
    const shopWebsiteUrl = "https://nsivegetables-coder.github.io/nsi-vegetables-pattambi/";

    function generatePremiumPosters() {
        const loading = document.getElementById("loading");
        const container = document.getElementById("posters-container");
        const tCard = document.getElementById("text-card");

        loading.style.display = "block";
        container.innerHTML = "";
        tCard.style.display = "none";

        fetch(sheetAppUrl)
            .then(res => res.json())
            .then(data => {
                loading.style.display = "none";
                
                let rawProducts = [];
                if (Array.isArray(data)) {
                    rawProducts = data;
                } else if (data && Array.isArray(data.data)) {
                    rawProducts = data.data;
                } else if (data && typeof data === 'object') {
                    rawProducts = Object.values(data).find(val => Array.isArray(val)) || [];
                }
                
                let cleanedItems = [];
                rawProducts.forEach(product => {
                    const keys = Object.keys(product).reduce((acc, k) => {
                        acc[k.toLowerCase().replace(/\s+/g, '')] = product[k];
                        return acc;
                    }, {});
                    
                    let name = keys['name'] || product['Name'] || product['name'] || "";
                    let price = parseFloat(keys['offerprice'] || product['OfferPrice'] || product['offerPrice'] || 0);
                    
                    if (name && name !== "No Name" && price > 0) {
                        cleanedItems.push({ name: name, price: price });
                    }
                });

                if (cleanedItems.length === 0) {
                    alert("ഷീറ്റിൽ ഡാറ്റ ഒന്നും കണ്ടെത്തിയില്ല!");
                    return;
                }

                const currentDate = new Date().toLocaleDateString('en-IN');

                let wrapper = document.createElement('div');
                wrapper.className = 'poster-wrapper';
                let posterId = `main-full-poster`;
                
                let gridCells = "";
                cleanedItems.forEach((item, index) => {
                    gridCells += `
                        <div class="grid-box">
                            <div class="box-left">
                                <div class="box-num">${index + 1}</div>
                                <div class="box-title">${item.name}</div>
                            </div>
                            <div class="box-price-tag">
                                <span class="tag-unit">1 KG</span>
                                <span class="tag-amount">₹${item.price}</span>
                            </div>
                        </div>
                    `;
                });

                wrapper.innerHTML = `
                    <div class="poster-card" id="${posterId}">
                        <div class="poster-header">
                            <div class="logo-area">
                                <h1 class="logo-text">NSI FRESH</h1>
                                <span class="logo-sub">Premium Quality</span>
                            </div>
                            <div class="divider-gold"></div>
                            <div class="banner-tagline">ഏറ്റവും മികച്ച പച്ചക്കറികൾ നിങ്ങളുടെ അടുക്കളയിലേക്ക്</div>
                            <div class="title-badge">DAILY PRICE LIST</div>
                            <div class="meta-info">
                                <span>📆 Date: ${currentDate}</span>
                                <span style="color: var(--nsi-dark-green)">Total Items: ${cleanedItems.length}</span>
                            </div>
                        </div>

                        <div class="items-grid">
                            ${gridCells}
                        </div>

                        <div class="poster-footer">
                            <div class="footer-banner-wa">
                                🟢 വാട്സാപ്പ് വഴി ഓർഡർ ചെയ്യാം: <b>+91 90 37 38 39 40</b>
                            </div>
                            <div class="delivery-badges-row">
                                <span class="badge-premium badge-green">⚡ Fast Delivery</span>
                                <span class="badge-premium badge-gold">✨ Premium Service</span>
                            </div>
                            <div class="guarantee-row">
                                <span>🌱 100% Freshness</span>
                                <span>🧼 Hygiene Ensured</span>
                                <span>🤝 Best Price</span>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn-share-wa" onclick="sharePosterToWhatsApp('${posterId}')">
                        🟢 ഈ പ്രീമിയം പോസ്റ്റർ വാട്സാപ്പിൽ അയക്കുക
                    </button>
                `;

                container.appendChild(wrapper);

                let broadcastMessage = `🥬 *NSI FRESH & GREEN* 🥬\n📆 വിലവിവരപ്പട്ടിക: ${currentDate}\n\n`;
                cleanedItems.forEach((item, idx) => {
                    broadcastMessage += `${idx + 1}. ${item.name} ➔ *₹${item.price}/kg*\n`;
                });
                broadcastMessage += `\n🛒 വെബ്സൈറ്റ് വഴി എളുപ്പത്തിൽ ഓർഡർ ചെയ്യാൻ:\n👉 ${shopWebsiteUrl}`;
                document.getElementById("text-area").value = broadcastMessage;
                tCard.style.display = "block";
            })
            .catch(error => {
                loading.style.display = "none";
                alert("ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല!");
                console.error(error);
            });
    }

    function sharePosterToWhatsApp(elementId) {
        const element = document.getElementById(elementId);
        const btn = element.nextElementSibling;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ പ്രീമിയം ഫോട്ടോ നിർമ്മിക്കുന്നു...";
        btn.disabled = true;

        html2canvas(element, {
            scale: 2.5, // സൂപ്പർ പ്രീമിയം ക്വാളിറ്റിക്ക് വേണ്ടി സ്കെയിൽ കൂട്ടി
            useCORS: true,
            backgroundColor: "#ffffff"
        }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], `NSI_Premium_PriceList.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: `NSI Premium Price List`,
                        text: `NSI Fresh ഇന്നത്തെ പ്രത്യേക വിലവിവരപ്പട്ടിക.\n🛒 ഓൺലൈനായി ഓർഡർ ചെയ്യാൻ: ${shopWebsiteUrl}`
                    })
                    .then(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    })
                    .catch((err) => {
                        console.error(err);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
                } else {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `NSI_Premium_PriceList.png`;
                    a.click();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert("പ്രീമിയം പോസ്റ്റർ ഫോണിലേക്ക് സേവ് ആയിട്ടുണ്ട്! ഇത് വാട്സാപ്പിൽ ഷെയർ ചെയ്യാം.");
                }
            }, 'image/png');
        });
    }

    function copyBroadcastText() {
        const area = document.getElementById("text-area");
        area.select();
        navigator.clipboard.writeText(area.value);
        alert("🎉 ലിസ്റ്റ് കോപ്പി ചെയ്തു!");
    }
</script>
</body>
</html>
