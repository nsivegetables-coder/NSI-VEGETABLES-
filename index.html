
         
    <!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Official Fixed Size Poster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nsi-green: #0d6632;
            --nsi-light-bg: #f8faf7;
            --price-bg: #0c572b;
            --text-dark: #1b2e22;
            --border-color: #d1dfd6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .loading-status {
            display: none;
            color: #666;
            font-weight: 500;
            margin: 15px 0;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            gap: 35px;
            width: 100%;
            align-items: center;
        }

        /* 🖼️ ഒരു പോസ്റ്ററിന്റെ കൃത്യമായ ഫിക്സഡ് വലുപ്പം (Fixed Standard Size) */
        .poster-card {
            width: 100%;
            max-width: 440px;
            height: 720px; /* 🔳 ഒരു പോസ്റ്ററിന്റെ വലുപ്പം എപ്പോഴും സ്ഥിരമായി നിർത്തുന്നു */
            background: #ffffff;
            border: 6px solid var(--nsi-green);
            border-radius: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* ഉള്ളടക്കം മുകളിലും താഴെയുമായി തുല്യമായി നിൽക്കും */
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        /* ഹെഡ്ഡർ ഡിസൈൻ */
        .poster-header {
            background: white;
            padding: 18px 15px 8px 15px;
            text-align: center;
            border-bottom: 2px solid var(--nsi-light-bg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-circle {
            background: var(--nsi-green);
            color: white;
            font-weight: 800;
            font-size: 26px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-right-radius: 0px;
        }

        .logo-titles h1 {
            margin: 0;
            font-size: 22px;
            color: var(--nsi-green);
            font-weight: 800;
            line-height: 1;
        }

        .logo-titles span {
            font-size: 9px;
            color: #444;
            font-weight: 700;
            letter-spacing: 0.8px;
            display: block;
            margin-top: 2px;
        }

        .banner-tagline {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 6px 0;
        }

        .title-badge {
            background: #fff;
            border: 2px solid var(--nsi-green);
            color: var(--nsi-green);
            padding: 3px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
            font-size: 11px;
            color: #555;
            font-weight: 700;
        }
