<! DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSI VEGETABLES</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{background:#1b8f3a;color:#fff;padding:15px;text-align:center;font-size:24px;font-weight:bold}
.container{padding:15px}
.card{background:#fff;border-radius:10px;padding:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
button{background:#1b8f3a;color:#fff;border:none;padding:6px 12px;border-radius:5px}
input,textarea{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px}
#cart{background:#fff;padding:10px;border-radius:10px;margin-top:20px}
.order{background:#25D366;font-size:18px;width:100%;padding:12px}
</style>

</head>
<body>

<header> NSI VEGETABLES PATTAMBI</header>

<div class="container">

<div id="products"></div>

<div id="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h3>Total ₹<span id="total">0</span></h3>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<textarea id="address" placeholder="Address"></textarea>

<button class="order" onclick="sendOrder()">WhatsApp Order</button>

</div>

</div>

<script>

const phone="917593925926";

const products=[
{name:"ഉരുളക്കിഴങ്ങ്",price:25,qty:0},
{name:"തക്കാളി",price:30,qty:0},
{name:"സവാള",price:40,qty:0},
{name:"പച്ചമുളക്",price:60,qty:0},
{name:"വെണ്ടക്ക",price:50,qty:0},
];

function showProducts(){

let html="";

products.forEach((p,i)=>{

html+=`
<div class="card">
<div>
<b>${p.name}</b><br>
₹${p.price}/kg
</div>

<div>

<button onclick="change(${i},-1)">-</button>

<b>${p.qty==0 ? "0" : (p.qty<1 ? (p.qty*1000)+"g" : p.qty+"kg")}</b>

<button onclick="change(${i},1)">+</button>

</div>

</div>
`;

});

document.getElementById("products").innerHTML=html;

cart();

}

function change(i,v){

products[i].qty += (0.25 * v);

if(products[i].qty < 0){
    products[i].qty = 0;
    }

    if(products[i].qty > 10){
        products[i].qty = 10;
        }

        products[i].qty = Number(products[i].qty.toFixed(2));

        showProducts();

        }



function cart(){

let html="";
let total=0;

products.forEach(p=>{

if(p.qty>0){

let qtyText = p.qty<1 ? (p.qty*1000)+"g" : p.qty+"kg";
html+=`${p.name} × ${qtyText}<br>`;

total+=p.qty*p.price;

}

});

document.getElementById("cartItems").innerHTML=html||"Cart Empty";

document.getElementById("total").innerHTML=total;

}

function sendOrder(){

let msg="*NSI VEGETABLES ORDER*%0A%0A";

products.forEach(p=>{

if(p.qty>0){

msg+=`${p.name} - ${p.qty}kg%0A`;

}

});

msg+=`%0ATotal ₹${document.getElementById("total").innerHTML}`;

msg+=`%0A%0AName: ${document.getElementById("name").value}`;

msg+=`%0APhone: ${document.getElementById("phone").value}`;

msg+=`%0AAddress: ${document.getElementById("address").value}`;

window.open(`https://wa.me/${phone}?text=${msg}`);

}


</div>

<script src="script.js"></script>

</body>
</html>
