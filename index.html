<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Premium 10-Item Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nsi-green: #0d6632;
            --nsi-light-bg: #f8faf7;
            --price-bg: #0c572b;
            --text-dark: #1b2e22;
            --border-color: #d1dfd6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .control-panel {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .loading-status {
            display: none;
            color: #666;
            font-weight: 500;
            margin: 15px 0;
            font-size: 14px;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            align-items: center;
        }

        .poster-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 5px solid var(--nsi-green);
            border-radius: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .poster-header {
            background: white;
            padding: 15px 10px 8px 10px;
            text-align: center;
            border-bottom: 2px solid var(--nsi-light-bg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-circle {
            background: var(--nsi-green);
            color: white;
            font-weight: 800;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-right-radius: 0px;
        }

        .logo-titles h1 {
            margin: 0;
            font-size: 20px;
            color: var(--nsi-green);
            font-weight: 800;
            line-height: 1;
        }

        .logo-titles span {
            font-size: 8.5px;
            color: #444;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 2px;
        }

        .banner-tagline {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 5px 0;
        }

        .title-badge {
            background: #fff;
            border: 2px solid var(--nsi-green);
            color: var(--nsi-green);
            padding: 2px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            display: inline-block;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
            font-size: 11px;
            color: #555;
            font-weight: 700;
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 10px;
            background: #fff;
            box-sizing: border-box;
        }

        .grid-box {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--nsi-light-bg);
            box-sizing: border-box;
            height: 46px;
            min-width: 0;
        }

        .box-left {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            min-width: 0;
        }

        .box-num {
            font-size: 10px;
            background: var(--nsi-green);
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .box-title {
            font-size: 12.5px;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .box-price-tag {
            text-align: center;
            background: var(--price-bg);
            color: white;
            padding: 3px 6px;
            border-radius: 5px;
            min-width: 44px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .tag-unit {
            font-size: 7.5px;
            display: block;
            opacity: 0.9;
            line-height: 1;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .tag-amount {
            font-size: 12.5px;
            font-weight: 700;
            line-height: 1;
            display: block;
        }

        .poster-footer {
            background: white;
            border-top: 2px solid var(--nsi-light-bg);
            padding: 10px;
            text-align: center;
            margin-top: auto;
        }

        .footer-banner-wa {
            background: #fff9eb;
            padding: 6px;
            border-radius: 8px;
            border: 1px dashed #e67e22;
            font-size: 11px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .footer-banner-wa b {
            color: var(--nsi-green);
            font-size: 13px;
        }

        .delivery-badges-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .badge-green, .badge-blue {
            font-size: 8.5px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .badge-green { background: #d4efdf; color: #196f3d; }
        .badge-blue { background: #d6eaf8; color: #21618c; }

        .guarantee-row {
            font-size: 9.5px;
            font-weight: 600;
            color: #7f8c8d;
            border-top: 1px solid #f1f5f9;
            padding-top: 6px;
            display: flex;
            justify-content: space-around;
        }

        .text-backup-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            max-width: 440px;
            margin: 20px auto;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            width: 100%;
            box-sizing: border-box;
        }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; background: #fafafa; font-family: inherit; font-size: 13px; box-sizing: border-box; }
        .btn-copy-text { width: 100%; background: #2c3e50; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2 style="margin: 0 0 5px 0; font-size: 18px; color: var(--nsi-green);">NSI Fresh & Green</h2>
        <p style="margin: 0 0 15px 0; font-size: 12px; color: #666;">ഒരു പോസ്റ്ററിൽ 10 എണ്ണം വീതം പുതിയ പ്രൈസ് ലിസ്റ്റ് ഉണ്ടാക്കൂ.</p>
        <button class="btn-generate" onclick="generatePremiumPosters()">✨ ഒഫീഷ്യൽ പോസ്റ്ററുകൾ നിർമ്മിക്കുക</button>
    </div>

    <div id="loading" class="loading-status">⏳ ഷീറ്റിൽ നിന്നും പുതിയ വില വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>

    <div class="posters-container" id="posters-container"></div>

    <div class="text-backup-card" id="text-card">
        <span style="font-size: 13px; font-weight: 700; color: #444; display:block; margin-bottom: 6px;">💬 വാട്സാപ്പ് മെസ്സേജ് ടെക്സ്റ്റ് ലിസ്റ്റ്:</span>
        <textarea id="text-area" rows="6"></textarea>
        <button class="btn-copy-text" onclick="copyBroadcastText()">📋 ടെക്സ്റ്റ് ലിസ്റ്റ് കോപ്പി ചെയ്യുക</button>
    </div>

<script>
    const sheetAppUrl = "https://script.google.com/macros/s/AKfycbyg9RmH2iFblNzWNBBL7J4SR-W003CQnDju8RPoPBINF_cD6Fdidkn7h9QLvMsL8u4z/exec";
    const shopWebsiteUrl = "https://nsivegetables-coder.github.io/nsi-vegetables-pattambi/";

    const emojiDictionary = {
        "തക്കാളി": "🍅", "Tomato": "🍅",
        "സവാള": "🧅", "ഉള്ളി": "🧅", "ചെറിയ ഉള്ളി": "🧅", "Onion": "🧅",
        "ഉരുളക്കിഴങ്ങ്": "🥔", "Potato": "🥔",
        "പച്ചമുളക്": "🌶️", "Chilli": "🌶️",
        "വെണ്ടക്ക": "🥒", "Ladies finger": "🥒",
        "മത്തൻ": "🎃", "Pumpkin": "🎃",
        "കുമ്പളങ്ങ": "🍈", "ചേന": "🥔", "ചേമ്പ്": "🥔",
        "വെള്ളരിക്ക": "🥒", "Cucumber": "🥒",
        "காரറ്റ്": "🥕", "Carrot": "🥕",
        "മുരിങ്ങക്കായ": "🌿", "പച്ചക്കായ": "🍌", "നേന്ത്രക്കായ": "🍌",
        "പടവലങ്ങ": "🥒", "ചിരങ്ങ": "🍈", "വഴുതനങ്ങ": "🍆", "ബീറ്റ്‌റൂട്ട്": "🍠",
        "മല്ലിചെപ്പ്": "🌿", "കറിവേപ്പില": "🍃", "പൊതീന": "🌱", "ഇഞ്ചി": "🫚", "വെളുത്തുള്ളി": "🧄"
    };

    function selectEmoji(itemName) {
        for (let key in emojiDictionary) {
            if (itemName.toLowerCase().includes(key.toLowerCase())) {
                return emojiDictionary[key];
            }
        }
        return "🥬";
    }

    function generatePremiumPosters() {
        const loading = document.getElementById("loading");
        const container = document.getElementById("posters-container");
        const tCard = document.getElementById("text-card");

        loading.style.display = "block";
        container.innerHTML = "";
        tCard.style.display = "none";

        // ഡാറ്റ സുഗമമായി എടുക്കാൻ കാഷെ മാറ്റി വേഗത കൂട്ടിയിട്ടുണ്ട്
        fetch(sheetAppUrl)
            .then(res => res.json())
            .then(data => {
                loading.style.display = "none";
                
                // നിങ്ങളുടെ ഗൂഗിൾ വെബ് ആപ്പ് നൽകുന്ന ഒറിജിനൽ അറേ മാത്രം കൃത്യമായി ഫിൽട്ടർ ചെയ്യുന്നു
                let rawProducts = [];
                if (Array.isArray(data)) {
                    rawProducts = data;
                } else if (data && Array.isArray(data.data)) {
                    rawProducts = data.data;
                } else if (data && typeof data === 'object') {
                    rawProducts = Object.values(data).find(val => Array.isArray(val)) || [];
                }
                
                let cleanedItems = [];
                rawProducts.forEach(product => {
                    const keys = Object.keys(product).reduce((acc, k) => {
                        acc[k.toLowerCase().replace(/\s+/g, '')] = product[k];
                        return acc;
                    }, {});
                    
                    let name = keys['name'] || product['Name'] || product['name'] || "";
                    let price = parseFloat(keys['offerprice'] || product['OfferPrice'] || product['offerPrice'] || 0);
                    
                    if (name && name !== "No Name" && price > 0) {
                        cleanedItems.push({ name: name, price: price, emoji: selectEmoji(name) });
                    }
                });

                if (cleanedItems.length === 0) {
                    alert("ഷീറ്റിൽ ഡാറ്റ ഒന്നും കണ്ടെത്താനായില്ല! ഗൂഗിൾ ഷീറ്റിലെ Name, Offer Price കോളങ്ങൾ പരിശോധിക്കുക.");
                    return;
                }

                const currentDate = new Date().toLocaleDateString('en-IN');
                const limit = 10;
                const totalPageCount = Math.ceil(cleanedItems.length / limit);

                for (let page = 0; page < totalPageCount; page++) {
                    const start = page * limit;
                    const end = Math.min(start + limit, cleanedItems.length);
                    const chunk = cleanedItems.slice(start, end);

                    let posterHtml = document.createElement('div');
                    posterHtml.className = 'poster-card';
                    
                    let gridCells = "";
                    chunk.forEach((item, index) => {
                        const serialNumber = start + index + 1;

                        gridCells += `
                            <div class="grid-box">
                                <div class="box-left">
                                    <div class="box-num">${serialNumber}</div>
                                    <div class="box-title">${item.emoji} ${item.name}</div>
                                </div>
                                <div class="box-price-tag">
                                    <span class="tag-unit">1 KG</span>
                                    <span class="tag-amount">₹${item.price}</span>
                                </div>
                            </div>
                        `;
                    });

                    posterHtml.innerHTML = `
                        <div class="poster-header">
                            <div class="logo-area">
                                <div class="logo-circle">NSi</div>
                                <div class="logo-titles">
                                    <h1>FRESH & GREEN</h1>
                                    <span>BEST PRICE | BEST QUALITY | BEST SERVICE</span>
                                </div>
                            </div>
                            <div class="banner-tagline">പുതുമയുള്ള പച്ചക്കറികൾ നേരിട്ട് നിങ്ങളുടെ വീട്ടിലേക്ക്</div>
                            <div class="title-badge">PRICE LIST</div>
                            <div class="meta-info">
                                <span>📆 Date: ${currentDate}</span>
                                <span style="color: var(--nsi-green)">PAGE ${page + 1} of ${totalPageCount}</span>
                            </div>
                        </div>

                        <div class="items-grid">
                            ${gridCells}
                        </div>

                        <div class="poster-footer">
                            <div class="footer-banner-wa">
                                🟢 WHATSAPP വഴി ഓർഡർ ചെയ്യൂ: <b>+91 90 37 38 39 40</b>
                            </div>
                            <div class="delivery-badges-row">
                                <span class="badge-green">FAST DELIVERY</span>
                                <span class="badge-blue">FREE DELIVERY ABOVE ₹499</span>
                            </div>
                            <div class="guarantee-row">
                                <span>🌱  പുതുമ നാം ഉറപ്പ്</span>
                                <span>🧼  ശുദ്ധിയും ഗുണവും</span>
                                <span>🤝  വിശ്വാസം വാഗ്ദാനം</span>
                            </div>
                        </div>
                    `;

                    container.appendChild(posterHtml);
                    
                    let hint = document.createElement('p');
                    hint.style.cssText = "color:#e67e22; font-weight:bold; font-size:12px; margin: 5px 0 25px 0; text-align:center;";
                    hint.innerText = `💡 പോസ്റ്റർ ${page + 1} റെഡി! ഇതിന്റെ സ്ക്രീൻഷോട്ട് എടുക്കാം.`;
                    container.appendChild(hint);
                }

                let broadcastMessage = `🥬 *NSI FRESH & GREEN* 🥬\n📆 വിലവിവരപ്പട്ടിക: ${currentDate}\n\n`;
                cleanedItems.forEach((item, idx) => {
                    broadcastMessage += `${idx + 1}. ${item.emoji} ${item.name} ➔ *₹${item.price}/kg*\n`;
                });
                broadcastMessage += `\n🛒 വെബ്സൈറ്റ് വഴി എളുപ്പത്തിൽ ഓർഡർ ചെയ്യാൻ:\n👉 ${shopWebsiteUrl}`;
                document.getElementById("text-area").value = broadcastMessage;
                tCard.style.display = "block";
            })
            .catch(error => {
                loading.style.display = "none";
                alert("ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല! ഇന്റർനെറ്റ് കണക്ഷൻ അല്ലെങ്കിൽ ഗൂഗിൾ സ്ക്രിപ്റ്റ് യുആർഎൽ പരിശോധിക്കുക.");
                console.error(error);
            });
    }

    function copyBroadcastText() {
        const area = document.getElementById("text-area");
        area.select();
        navigator.clipboard.writeText(area.value);
        alert("🎉 ലിസ്റ്റ് വിജയകരമായി കോപ്പി ചെയ്തു!");
    }
</script>
</body>
</html>
