<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Premium 15-Item Multi-Page Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Serif+Malayalam:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --nsi-dark-green: #064e28;
            --nsi-gold: #cca43b;
            --nsi-gold-light: #f9f5e8;
            --text-dark: #112211;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Manrope', 'Noto Serif Malayalam', sans-serif;
            background-color: #eef2f0;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(6, 78, 40, 0.1);
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #064e28, #11753e);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(6, 78, 40, 0.2);
        }

        .loading-status {
            display: none;
            color: var(--nsi-dark-green);
            font-weight: 600;
            margin: 15px 0;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            align-items: center;
        }

        .poster-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .poster-card {
            width: 100%;
            background: #ffffff;
            border-top: 14px solid var(--nsi-dark-green);
            border-bottom: 14px solid var(--nsi-dark-green);
            border-radius: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .poster-header {
            background: #ffffff;
            padding: 22px 20px 12px 20px;
            text-align: center;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            color: var(--nsi-dark-green);
            letter-spacing: 1.5px;
            margin: 0;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--nsi-gold);
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .divider-gold {
            width: 70px;
            height: 3px;
            background: var(--nsi-gold);
            margin: 10px auto;
            border-radius: 2px;
        }

        .title-badge {
            background: var(--nsi-dark-green);
            color: #ffffff;
            padding: 5px 30px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 8px;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
            color: #718096;
            font-weight: 700;
            border-top: 1px solid #edf2f7;
            padding-top: 8px;
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 15px;
            background: #fcfdfe;
        }

        .item-row {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            box-sizing: border-box;
            height: 56px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
        }

        .box-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .box-num {
            font-size: 10px;
            background: #edf2f7;
            color: var(--nsi-dark-green);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .box-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .box-price-tag {
            text-align: center;
            background: linear-gradient(135deg, #064e28, #0b6b39);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            min-width: 60px;
            flex-shrink: 0;
            border-bottom: 2.5px solid var(--nsi-gold);
        }

        .tag-unit {
            font-size: 8px;
            display: block;
            opacity: 0.85;
            font-weight: 600;
        }

        .tag-amount {
            font-size: 14px;
            font-weight: 800;
            display: block;
        }

        .poster-footer {
            background: white;
            border-top: 1px solid #edf2f7;
            padding: 15px;
            text-align: center;
        }

        .footer-banner-wa {
            background: var(--nsi-gold-light);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(204, 164, 59, 0.3);
            font-size: 12px;
            font-weight: 700;
            color: var(--nsi-dark-green);
        }

        .footer-banner-wa b {
            color: #d35400;
            font-size: 14px;
        }

        .btn-share-wa {
            background: #25d366;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            margin-top: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .text-backup-card {
            background: white;
            padding: 18px;
            border-radius: 20px;
            max-width: 450px;
            margin: 20px auto;
            display: none;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
        }
        textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e0; background: #f7fafc; font-family: inherit; font-size: 13px; box-sizing: border-box; }
        .btn-copy-text { width: 100%; background: #2d3748; color: white; border: none; padding: 14px; border-radius: 12px; margin-top: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2 style="margin: 0 0 5px 0; font-size: 20px; color: var(--nsi-dark-green); font-weight: 800;">NSI HD Posters</h2>
        <p style="margin: 0 0 18px 0; font-size: 12px; color: #718096;">ഒരു പോസ്റ്ററിൽ 15 എണ്ണം വീതമുള്ള മൾട്ടി-പേജ് പ്രൈസ് ലിസ്റ്റ്</p>
        <button class="btn-generate" onclick="generatePremiumPosters()">✨ പ്രീമിയം പോസ്റ്ററുകൾ ഉണ്ടാക്കുക</button>
    </div>

    <div id="loading" class="loading-status">⏳ ഷീറ്റിൽ നിന്നും വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>

    <div class="posters-container" id="posters-container"></div>

    <div class="text-backup-card" id="text-card">
        <span style="font-size: 13px; font-weight: 700; color: #2d3748; display:block; margin-bottom: 8px;">💬 വാട്സാപ്പ് മെസ്സേജ് ടെക്സ്റ്റ് ലിസ്റ്റ്:</span>
        <textarea id="text-area" rows="6"></textarea>
        <button class="btn-copy-text" onclick="copyBroadcastText()">📋 ടെക്സ്റ്റ് ലിസ്റ്റ് കോപ്പി ചെയ്യുക</button>
    </div>

<script>
    const sheetAppUrl = "https://script.google.com/macros/s/AKfycbyg9RmH2iFblNzWNBBL7J4SR-W003CQnDju8RPoPBINF_cD6Fdidkn7h9QLvMsL8u4z/exec";

    function generatePremiumPosters() {
        const loading = document.getElementById("loading");
        const container = document.getElementById("posters-container");
        const tCard = document.getElementById("text-card");

        loading.style.display = "block";
        container.innerHTML = "";
        tCard.style.display = "none";

        fetch(sheetAppUrl)
            .then(res => res.json())
            .then(data => {
                loading.style.display = "none";
                
                let rawProducts = [];
                if (Array.isArray(data)) { rawProducts = data; }
                else if (data && Array.isArray(data.data)) { rawProducts = data.data; }
                
                let cleanedItems = [];
                rawProducts.forEach(product => {
                    const keys = Object.keys(product).reduce((acc, k) => {
                        acc[k.toLowerCase().replace(/\s+/g, '')] = product[k];
                        return acc;
                    }, {});
                    
                    let name = keys['name'] || product['Name'] || product['name'] || "";
                    let price = parseFloat(keys['offerprice'] || product['OfferPrice'] || product['offerPrice'] || 0);
                    
                    if (name && name !== "No Name" && price > 0) {
                        cleanedItems.push({ name: name, price: price });
                    }
                });

                if (cleanedItems.length === 0) {
                    alert("ഷീറ്റിൽ ഡാറ്റ ഒന്നും കണ്ടെത്തിയില്ല!");
                    return;
                }

                const currentDate = new Date().toLocaleDateString('en-IN');
                const limit = 15;
                const totalPageCount = Math.ceil(cleanedItems.length / limit);

                for (let page = 0; page < totalPageCount; page++) {
                    const start = page * limit;
                    const end = Math.min(start + limit, cleanedItems.length);
                    const chunk = cleanedItems.slice(start, end);

                    let wrapper = document.createElement('div');
                    wrapper.className = 'poster-wrapper';
                    let posterId = `poster-page-${page + 1}`;
                    
                    let listRows = "";
                    chunk.forEach((item, index) => {
                        const serialNumber = start + index + 1;
                        listRows += `
                            <div class="item-row">
                                <div class="box-left">
                                    <div class="box-num">${serialNumber}</div>
                                    <div class="box-title">${item.name}</div>
                                </div>
                                <div class="box-price-tag">
                                    <span class="tag-unit">1 KG</span>
                                    <span class="tag-amount">₹${item.price}</span>
                                </div>
                            </div>
                        `;
                    });

                    wrapper.innerHTML = `
                        <div class="poster-card" id="${posterId}">
                            <div class="poster-header">
                                <h1 class="logo-text">NSI FRESH</h1>
                                <span class="logo-sub">Premium Quality</span>
                                <div class="divider-gold"></div>
                                <div class="title-badge">DAILY PRICE LIST</div>
                                <div class="meta-info">
                                    <span>📆 Date: ${currentDate}</span>
                                    <span style="color: var(--nsi-dark-green)">PAGE ${page + 1} of ${totalPageCount}</span>
                                </div>
                            </div>

                            <div class="items-list">
                                ${listRows}
                            </div>

                            <div class="poster-footer">
                                <div class="footer-banner-wa">
                                    🟢 വാട്സാപ്പ് ഓർഡറുകൾക്ക്: <b>+91 90 37 38 39 40</b>
                                </div>
                            </div>
                        </div>
                        
                        <button class="btn-share-wa" onclick="sharePosterToWhatsApp('${posterId}', ${page + 1})">
                            🟢 പേജ് ${page + 1} വാട്സാപ്പിൽ അയക്കുക
                        </button>
                    `;

                    container.appendChild(wrapper);
                }

                let broadcastMessage = `🥬 *NSI FRESH & GREEN* 🥬\n📆 വിലവിവരപ്പട്ടിക: ${currentDate}\n\n`;
                cleanedItems.forEach((item, idx) => {
                    broadcastMessage += `${idx + 1}. ${item.name} ➔ *₹${item.price}/kg*\n`;
                });
                broadcastMessage += `\n🛒 ഓർഡറുകൾ വാട്സാപ്പിൽ അയക്കൂ!`;
                document.getElementById("text-area").value = broadcastMessage;
                tCard.style.display = "block";
            })
            .catch(error => {
                loading.style.display = "none";
                alert("ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല!");
            });
    }

    function sharePosterToWhatsApp(elementId, pageNum) {
        const element = document.getElementById(elementId);
        const btn = element.nextElementSibling;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ എച്ച്ഡി ഫോട്ടോ നിർമ്മിക്കുന്നു...";
        btn.disabled = true;

        html2canvas(element, {
            scale: 3,
            useCORS: true,
            backgroundColor: "#ffffff"
        }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], `NSI_Page_${pageNum}.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: `NSI Price List - Page ${pageNum}`,
                        text: `NSI Fresh ഇന്നത്തെ വിലവിവരപ്പട്ടിക (പേജ് ${pageNum}).`
                    })
                    .then(() => { btn.innerHTML = originalText; btn.disabled = false; })
                    .catch((err) => { btn.innerHTML = originalText; btn.disabled = false; });
                } else {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `NSI_Page_${pageNum}.png`;
                    a.click();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert("ഫോട്ടോ ഫോണിലേക്ക് ഡൗൺലോഡ് ആയിട്ടുണ്ട്!");
                }
            }, 'image/png');
        });
    }

    function copyBroadcastText() {
        const area = document.getElementById("text-area");
        area.select();
        navigator.clipboard.writeText(area.value);
        alert("🎉 ലിസ്റ്റ് കോപ്പി ചെയ്തു!");
    }
</script>
</body>
</html>
