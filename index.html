<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Premium Multi-Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --nsi-green: #0d6632;
            --nsi-light-bg: #f8faf7;
            --price-bg: #0c572b;
            --text-dark: #1b2e22;
            --border-color: #d1dfd6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .control-panel {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .loading-status {
            display: none;
            color: #666;
            font-weight: 500;
            margin: 15px 0;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            align-items: center;
        }

        /* 🖼️ ഒറിജിനൽ ലുക്കിലുള്ള ഓരോ പോസ്റ്റർ ബോക്സും */
        .poster-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 6px solid var(--nsi-green);
            border-radius: 24px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            overflow: hidden;
            margin-bottom: 10px;
        }

        /* ഹെഡ്ഡർ ഡിസൈൻ */
        .poster-header {
            background: white;
            padding: 18px 15px 8px 15px;
            text-align: center;
            border-bottom: 2px solid var(--nsi-light-bg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo-circle {
            background: var(--nsi-green);
            color: white;
            font-weight: 800;
            font-size: 26px;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-right-radius: 0px;
        }

        .logo-titles h1 {
            margin: 0;
            font-size: 22px;
            color: var(--nsi-green);
            font-weight: 800;
            line-height: 1;
        }

        .logo-titles span {
            font-size: 9px;
            color: #444;
            font-weight: 700;
            letter-spacing: 0.8px;
            display: block;
            margin-top: 2px;
        }

        .banner-tagline {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 6px 0;
        }

        .title-badge {
            background: #fff;
            border: 2px solid var(--nsi-green);
            color: var(--nsi-green);
            padding: 3px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            padding: 0 5px;
            margin-top: 8px;
            font-size: 11px;
            color: #555;
            font-weight: 700;
        }

        /* 📋 രണ്ട് കോളം ഗ്രിഡ് ലേഔട്ട് */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            padding: 12px;
            background: #fff;
        }

        .grid-box {
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--nsi-light-bg);
            box-sizing: border-box;
        }

        /* 17-ാമത്തെ ഐറ്റം വരിയിൽ ഒറ്റയ്ക്ക് വരാൻ */
        .grid-box.last-single-item {
            grid-column: span 2;
            max-width: 50%;
            margin: 0 auto;
            width: 100%;
        }

        .box-left {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .box-num {
            font-size: 11px;
            background: var(--nsi-green);
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .box-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .box-price-tag {
            text-align: center;
            background: var(--price-bg);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            min-width: 50px;
            flex-shrink: 0;
        }

        .tag-unit {
            font-size: 8px;
            display: block;
            opacity: 0.9;
            line-height: 1;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .tag-amount {
            font-size: 13px;
            font-weight: 700;
            line-height: 1;
            display: block;
        }

        /* ഫൂട്ടർ ഡിസൈൻ */
        .poster-footer {
            background: white;
            border-top: 2px solid var(--nsi-light-bg);
            padding: 12px;
            text-align: center;
            margin-top: auto; /* ഫൂട്ടർ എപ്പോഴും താഴെ ഉറപ്പിച്ചു നിർത്താൻ */
        }

        .footer-banner-wa {
            background: #fff9eb;
            padding: 8px;
            border-radius: 10px;
            border: 1px dashed #e67e22;
            font-size: 12px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .footer-banner-wa b {
            color: var(--nsi-green);
            font-size: 14px;
        }

        .delivery-badges-row {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .badge-green {
            background: #d4efdf;
            color: #196f3d;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .badge-blue {
            background: #d6eaf8;
            color: #21618c;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .guarantee-row {
            font-size: 10px;
            font-weight: 600;
            color: #7f8c8d;
            border-top: 1px solid #f1f5f9;
            padding-top: 8px;
            display: flex;
            justify-content: space-around;
        }

        .text-backup-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            max-width: 440px;
            margin: 20px auto;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            width: 100%;
            box-sizing: border-box;
        }

        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; background: #fafafa; font-family: inherit; font-size: 13px; box-sizing: border-box; }
        .btn-copy-text { width: 100%; background: #2c3e50; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>

        <h2 style="margin: 0 0 5px 0; font-size: 18px; color: var
