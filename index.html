<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSI Premium All-in-One Poster Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --nsi-green: #0d6632;
            --nsi-light-bg: #f8faf7;
            --price-bg: #0c572b;
            --text-dark: #1b2e22;
            --border-color: #d1dfd6;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .control-panel {
            width: 100%;
            max-width: 440px;
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 25px;
            box-sizing: border-box;
        }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }

        .loading-status {
            display: none;
            color: #666;
            font-weight: 500;
            margin: 15px 0;
            font-size: 14px;
        }

        .posters-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
        }

        .poster-wrapper {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .poster-card {
            width: 100%;
            background: #ffffff;
            border: 6px solid var(--nsi-green);
            border-radius: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .poster-header {
            background: white;
            padding: 15px 10px 8px 10px;
            text-align: center;
            border-bottom: 2px solid var(--nsi-light-bg);
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-circle {
            background: var(--nsi-green);
            color: white;
            font-weight: 800;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom-right-radius: 0px;
        }

        .logo-titles h1 {
            margin: 0;
            font-size: 20px;
            color: var(--nsi-green);
            font-weight: 800;
            line-height: 1;
        }

        .logo-titles span {
            font-size: 8.5px;
            color: #444;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 2px;
        }

        .banner-tagline {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 5px 0;
        }

        .title-badge {
            background: #fff;
            border: 2px solid var(--nsi-green);
            color: var(--nsi-green);
            padding: 2px 25px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            display: inline-block;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 11px;
            color: #555;
            font-weight: 700;
        }

        /* 📋 എല്ലാ ഐറ്റങ്ങളും താഴെ താഴെയായി കാണിക്കാനുള്ള ഗ്രിഡ് */
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 10px;
            background: #fff;
            box-sizing: border-box;
        }

        .grid-box {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--nsi-light-bg);
            box-sizing: border-box;
            height: 52px;
            min-width: 0;
            gap: 5px;
        }

        .box-left {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            min-width: 0;
            flex: 1;
        }

        .box-num {
            font-size: 10px;
            background: var(--nsi-green);
            color: white;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .box-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dark);
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .box-price-tag {
            text-align: center;
            background: var(--price-bg);
            color: white;
            padding: 3px 6px;
            border-radius: 5px;
            min-width: 46px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .tag-unit {
            font-size: 7.5px;
            display: block;
            opacity: 0.9;
            line-height: 1;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .tag-amount {
            font-size: 12.5px;
            font-weight: 700;
            line-height: 1;
            display: block;
        }

        .poster-footer {
            background: white;
            border-top: 2px solid var(--nsi-light-bg);
            padding: 10px;
            text-align: center;
            margin-top: auto;
        }

        .footer-banner-wa {
            background: #fff9eb;
            padding: 6px;
            border-radius: 8px;
            border: 1px dashed #e67e22;
            font-size: 11px;
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        .footer-banner-wa b {
            color: var(--nsi-green);
            font-size: 13px;
        }

        .delivery-badges-row {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .badge-green, .badge-blue {
            font-size: 8.5px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
        }
        .badge-green { background: #d4efdf; color: #196f3d; }
        .badge-blue { background: #d6eaf8; color: #21618c; }

        .guarantee-row {
            font-size: 9.5px;
            font-weight: 600;
            color: #7f8c8d;
            border-top: 1px solid #f1f5f9;
            padding-top: 6px;
            display: flex;
            justify-content: space-around;
        }

        .btn-share-wa {
            background: #25d366;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            margin-top: 12px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .text-backup-card {
            background: white;
            padding: 15px;
            border-radius: 16px;
            max-width: 440px;
            margin: 20px auto;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            width: 100%;
            box-sizing: border-box;
        }
        textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; background: #fafafa; font-family: inherit; font-size: 13px; box-sizing: border-box; }
        .btn-copy-text { width: 100%; background: #2c3e50; color: white; border: none; padding: 12px; border-radius: 10px; margin-top: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2 style="margin: 0 0 5px 0; font-size: 18px; color: var(--nsi-green);">NSI Fresh & Green</h2>
        <p style="margin: 0 0 15px 0; font-size: 12px; color: #666;">എല്ലാ പച്ചക്കറികളും ഒരൊറ്റ വലിയ പോസ്റ്ററിൽ നിർമ്മിക്കുക.</p>
        <button class="btn-generate" onclick="generatePremiumPosters()">✨ ഒഫീഷ്യൽ പോസ്റ്റർ നിർമ്മിക്കുക</button>
    </div>

    <div id="loading" class="loading-status">⏳ ഷീറ്റിൽ നിന്നും പുതിയ വില വിവരങ്ങൾ ശേഖരിക്കുന്നു...</div>

    <div class="posters-container" id="posters-container"></div>

    <div class="text-backup-card" id="text-card">
        <span style="font-size: 13px; font-weight: 700; color: #444; display:block; margin-bottom: 6px;">💬 വാട്സാപ്പ് മെസ്സേജ് ടെക്സ്റ്റ് ലിസ്റ്റ്:</span>
        <textarea id="text-area" rows="6"></textarea>
        <button class="btn-copy-text" onclick="copyBroadcastText()">📋 ടെക്സ്റ്റ് ലിസ്റ്റ് കോപ്പി ചെയ്യുക</button>
    </div>

<script>
    const sheetAppUrl = "https://script.google.com/macros/s/AKfycbyg9RmH2iFblNzWNBBL7J4SR-W003CQnDju8RPoPBINF_cD6Fdidkn7h9QLvMsL8u4z/exec";
    const shopWebsiteUrl = "https://nsivegetables-coder.github.io/nsi-vegetables-pattambi/";

    function generatePremiumPosters() {
        const loading = document.getElementById("loading");
        const container = document.getElementById("posters-container");
        const tCard = document.getElementById("text-card");

        loading.style.display = "block";
        container.innerHTML = "";
        tCard.style.display = "none";

        fetch(sheetAppUrl)
            .then(res => res.json())
            .then(data => {
                loading.style.display = "none";
                
                let rawProducts = [];
                if (Array.isArray(data)) {
                    rawProducts = data;
                } else if (data && Array.isArray(data.data)) {
                    rawProducts = data.data;
                } else if (data && typeof data === 'object') {
                    rawProducts = Object.values(data).find(val => Array.isArray(val)) || [];
                }
                
                let cleanedItems = [];
                rawProducts.forEach(product => {
                    const keys = Object.keys(product).reduce((acc, k) => {
                        acc[k.toLowerCase().replace(/\s+/g, '')] = product[k];
                        return acc;
                    }, {});
                    
                    let name = keys['name'] || product['Name'] || product['name'] || "";
                    let price = parseFloat(keys['offerprice'] || product['OfferPrice'] || product['offerPrice'] || 0);
                    
                    if (name && name !== "No Name" && price > 0) {
                        cleanedItems.push({ name: name, price: price });
                    }
                });

                if (cleanedItems.length === 0) {
                    alert("ഷീറ്റിൽ ഡാറ്റ ഒന്നും കണ്ടെത്തിയില്ല!");
                    return;
                }

                const currentDate = new Date().toLocaleDateString('en-IN');

                let wrapper = document.createElement('div');
                wrapper.className = 'poster-wrapper';
                let posterId = `main-full-poster`;
                
                let gridCells = "";
                cleanedItems.forEach((item, index) => {
                    gridCells += `
                        <div class="grid-box">
                            <div class="box-left">
                                <div class="box-num">${index + 1}</div>
                                <div class="box-title">${item.name}</div>
                            </div>
                            <div class="box-price-tag">
                                <span class="tag-unit">1 KG</span>
                                <span class="tag-amount">₹${item.price}</span>
                            </div>
                        </div>
                    `;
                });

                wrapper.innerHTML = `
                    <div class="poster-card" id="${posterId}">
                        <div class="poster-header">
                            <div class="logo-area">
                                <div class="logo-circle">NSi</div>
                                <div class="logo-titles">
                                    <h1>FRESH & GREEN</h1>
                                    <span>BEST PRICE | BEST QUALITY | BEST SERVICE</span>
                                </div>
                            </div>
                            <div class="banner-tagline">പുതുമയുള്ള പച്ചക്കറികൾ നേരിട്ട് നിങ്ങളുടെ വീട്ടിലേക്ക്</div>
                            <div class="title-badge">PRICE LIST</div>
                            <div class="meta-info">
                                <span>📆 Date: ${currentDate}</span>
                                <span style="color: var(--nsi-green)">Total Items: ${cleanedItems.length}</span>
                            </div>
                        </div>

                        <div class="items-grid">
                            ${gridCells}
                        </div>

                        <div class="poster-footer">
                            <div class="footer-banner-wa">
                                🟢 WHATSAPP വഴി ഓർഡർ ചെയ്യൂ: <b>+91 90 37 38 39 40</b>
                            </div>
                            <div class="delivery-badges-row">
                                <span class="badge-green">FAST DELIVERY</span>
                                <span class="badge-blue">FREE DELIVERY ABOVE ₹499</span>
                            </div>
                            <div class="guarantee-row">
                                <span>🌱  പുതുമ നാം ഉറപ്പ്</span>
                                <span>🧼  ശുദ്ധിയും ഗുണവും</span>
                                <span>🤝  വിശ്വാസം വാഗ്ദാനം</span>
                            </div>
                        </div>
                    </div>
                    
                    <button class="btn-share-wa" onclick="sharePosterToWhatsApp('${posterId}')">
                        🟢 ഈ ഒരൊറ്റ പോസ്റ്റർ വാട്സാപ്പിൽ ഷെയർ ചെയ്യുക
                    </button>
                `;

                container.appendChild(wrapper);

                let broadcastMessage = `🥬 *NSI FRESH & GREEN* 🥬\n📆 വിലവിവരപ്പട്ടിക: ${currentDate}\n\n`;
                cleanedItems.forEach((item, idx) => {
                    broadcastMessage += `${idx + 1}. ${item.name} ➔ *₹${item.price}/kg*\n`;
                });
                broadcastMessage += `\n🛒 വെബ്സൈറ്റ് വഴി എളുപ്പത്തിൽ ഓർഡർ ചെയ്യാൻ:\n👉 ${shopWebsiteUrl}`;
                document.getElementById("text-area").value = broadcastMessage;
                tCard.style.display = "block";
            })
            .catch(error => {
                loading.style.display = "none";
                alert("ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല!");
                console.error(error);
            });
    }

    function sharePosterToWhatsApp(elementId) {
        const element = document.getElementById(elementId);
        const btn = element.nextElementSibling;
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ ഫോട്ടോ തയ്യാറാക്കുന്നു (ദയവായി കാത്തിരിക്കുക)...";
        btn.disabled = true;

        html2canvas(element, {
            scale: 2, 
            useCORS: true,
            backgroundColor: "#ffffff"
        }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], `NSI_Full_PriceList.png`, { type: 'image/png' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({
                        files: [file],
                        title: `NSI Fresh & Green Full Price List`,
                        text: `NSI Fresh & Green ഇന്നത്തെ മുഴുവൻ വിലവിവരപ്പട്ടിക.\n🛒 ഓൺലൈനായി ഓർഡർ ചെയ്യാൻ: ${shopWebsiteUrl}`
                    })
                    .then(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    })
                    .catch((err) => {
                        console.error(err);
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                    });
                } else {
                    const a = document.createElement('a');
                    a.href = canvas.toDataURL('image/png');
                    a.download = `NSI_Full_PriceList.png`;
                    a.click();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    alert("പോസ്റ്റർ ഫോണിലേക്ക് ഡൗൺലോഡ് ആയിട്ടുണ്ട്! ഇത് വാട്സാപ്പിൽ അയക്കാം.");
                }
            }, 'image/png');
        });
    }

    function copyBroadcastText() {
        const area = document.getElementById("text-area");
        area.select();
        navigator.clipboard.writeText(area.value);
        alert("🎉 ലിസ്റ്റ് വിജയകരമായി കോപ്പി ചെയ്തു!");
    }
</script>
</body>
</html>
